name: governance-baseline

on:
  pull_request:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
      - ".github/**"
      - "changelog/**"

jobs:
  docs-policy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required documentation
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "README.md"
            "docs/index.md"
            "docs/cicd.md"
            "docs/branch-protection.md"
            "docs/golden-path.md"
            "docs/smoke-test.md"
            "docs/versionamento.md"
            "docs/rollout.md"
            "docs/rollback.md"
            ".github/PULL_REQUEST_TEMPLATE.md"
            "templates/README.md"
            "templates/node-consumer/README.md"
            "templates/node-consumer/.arch-guidelines.yml"
            "templates/node-consumer/.github/CODEOWNERS"
            "templates/node-consumer/.github/PULL_REQUEST_TEMPLATE.md"
            "templates/node-consumer/.github/workflows/ci.yml"
            "templates/node-consumer/.github/workflows/security.yml"
          )

          for file in "${required_files[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done

      - name: Validate policy links and stable CI reference
        shell: bash
        run: |
          set -euo pipefail

          grep -q '\[Branch Protection\](branch-protection.md)' docs/index.md
          grep -q '\[Golden Path\](golden-path.md)' docs/index.md
          grep -q '\[Smoke Test no Piloto\](smoke-test.md)' docs/index.md
          grep -q '\[Versionamento de Workflows\](versionamento.md)' docs/index.md
          grep -q 'ci-reusable.yml@v1' docs/cicd.md
          grep -q 'ci-reusable.yml@v1' templates/node-consumer/.github/workflows/ci.yml
          grep -q 'security-reusable.yml@v1' templates/node-consumer/.github/workflows/security.yml
          grep -q 'issue_templates_enabled: false' templates/node-consumer/.arch-guidelines.yml

          if test -d 'templates/node-consumer/.github/ISSUE_TEMPLATE'; then
            echo "node-consumer must not ship ISSUE_TEMPLATE by default."
            exit 1
          fi

          if grep -q 'ci-reusable.yml@main' docs/cicd.md; then
            echo "docs/cicd.md must not use @main as the default consumption example."
            exit 1
          fi

  reusable-workflows:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate reusable workflow contracts
        shell: bash
        run: |
          set -euo pipefail

          test -f ".github/workflows/ci-reusable.yml"
          test -f ".github/workflows/security-reusable.yml"

          grep -q 'workflow_call:' .github/workflows/ci-reusable.yml
          grep -q 'workflow_call:' .github/workflows/security-reusable.yml
          grep -q 'install-command:' .github/workflows/ci-reusable.yml
          grep -q 'lint-command:' .github/workflows/ci-reusable.yml
          grep -q 'test-command:' .github/workflows/ci-reusable.yml
          grep -q 'build-command:' .github/workflows/ci-reusable.yml
          grep -q 'actions/dependency-review-action@v4' .github/workflows/security-reusable.yml
