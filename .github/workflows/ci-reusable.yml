name: reusable-ci

on:
  workflow_call:
    inputs:
      setup-node:
        description: "Node.js version (optional)"
        required: false
        type: string
      install-command:
        description: "Dependency install command"
        required: false
        default: ""
        type: string
      lint-command:
        description: "Lint command"
        required: false
        default: ""
        type: string
      test-command:
        description: "Test command"
        required: false
        default: ""
        type: string
      build-command:
        description: "Build command"
        required: false
        default: ""
        type: string

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ inputs.setup-node != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.setup-node }}

      - name: Install dependencies
        if: ${{ inputs.install-command != '' }}
        run: ${{ inputs.install-command }}

      - name: Lint
        if: ${{ inputs.lint-command != '' }}
        run: ${{ inputs.lint-command }}

      - name: Test
        if: ${{ inputs.test-command != '' }}
        run: ${{ inputs.test-command }}

      - name: Build
        if: ${{ inputs.build-command != '' }}
        run: ${{ inputs.build-command }}
