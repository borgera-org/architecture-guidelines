version: 0.1.0
archetypeId: api-dotnet
scenarioId: minimal-default
snapshotRoot: billing-api
description: >
  Manifesto de referencia para o snapshot materializado do archetype
  api-dotnet no cenario padrao com testes e Docker habilitados.

inputs:
  repositoryName: billing-api
  serviceName: billing-api
  solutionName: Billing.Api
  rootNamespace: Billing.Api
  targetFramework: net8.0
  dotnetImageTag: "8.0"
  includeTests: true
  includeDocker: true

appliedTemplates:
  - id: repository-files
  - id: dotnet-solution
  - id: api-project
  - id: test-project
  - id: docker-files

postProcessing:
  - type: solution-add-project
    solution: billing-api/Billing.Api.sln
    project: billing-api/src/Billing.Api/Billing.Api.csproj
  - type: solution-add-project
    solution: billing-api/Billing.Api.sln
    project: billing-api/tests/Billing.Api.Tests/Billing.Api.Tests.csproj

expectedFiles:
  - billing-api/.dockerignore
  - billing-api/.editorconfig
  - billing-api/.gitattributes
  - billing-api/.gitignore
  - billing-api/README.md
  - billing-api/Billing.Api.sln
  - billing-api/Directory.Build.props
  - billing-api/Dockerfile
  - billing-api/src/Billing.Api/Billing.Api.csproj
  - billing-api/src/Billing.Api/Program.cs
  - billing-api/src/Billing.Api/appsettings.json
  - billing-api/src/Billing.Api/appsettings.Development.json
  - billing-api/src/Billing.Api/Properties/launchSettings.json
  - billing-api/tests/Billing.Api.Tests/Billing.Api.Tests.csproj
  - billing-api/tests/Billing.Api.Tests/HealthEndpointTests.cs

validationFocus:
  - render de placeholders em caminho
  - render de placeholders em conteudo
  - remocao de sufixo .tpl
  - selecao de templates condicionais com valores padrao
  - pos-processamento da solution
